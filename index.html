<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1ea7c4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Freeword" />
    <title>Freeword</title>
    <script>
      // Applies the theme before the app bundle loads, so there's no flash
      // of the wrong theme on a dark-mode device. Mirrors the logic in
      // src/lib/theme.ts (kept in sync there) — must be plain inline JS
      // since it runs before any module import is available.
      (function () {
        var stored = localStorage.getItem('themePreference');
        var pref = stored === 'light' || stored === 'dark' ? stored : 'system';
        var effective = pref === 'system'
          ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : pref;
        document.documentElement.dataset.theme = effective;
        document.documentElement.style.colorScheme = effective;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
